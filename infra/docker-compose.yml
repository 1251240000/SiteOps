# siteops — production stack (single host).
#
# Brings up: postgres + redis + web + worker + caddy.
# Caddy is the only service that publishes ports to the public interface;
# pg/redis are bound to 127.0.0.1 so they're reachable for ops tooling on
# the host but never directly exposed to the internet.
#
# Usage:
#   docker compose -f infra/docker-compose.yml build
#   docker compose -f infra/docker-compose.yml up -d
#   curl -fsS http://localhost/healthz
#
# Required env (see .env.example):
#   POSTGRES_PASSWORD, REDIS_PASSWORD, AUTH_SECRET, SITEOPS_DOMAIN

name: siteops

x-web-env: &web-env
  NODE_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-info}
  PORT: '3000'
  HOST: '0.0.0.0'
  DATABASE_URL: postgres://${POSTGRES_USER:-siteops}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-siteops}
  REDIS_URL: ${SITEOPS_REDIS_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379}
  AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
  AUTH_URL: ${AUTH_URL:?AUTH_URL is required}
  ALERT_CIPHER_KEY: ${ALERT_CIPHER_KEY:?ALERT_CIPHER_KEY is required}

services:
  postgres:
    image: postgres:16-alpine
    container_name: siteops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siteops}
      POSTGRES_USER: ${POSTGRES_USER:-siteops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-siteops} -d ${POSTGRES_DB:-siteops}']
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - siteops-net

  redis:
    image: redis:7-alpine
    container_name: siteops-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
               exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes;
             else
               exec redis-server --appendonly yes;
             fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG']
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - siteops-net

  web:
    image: ${SITEOPS_WEB_IMAGE:-siteops/web:local}
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    container_name: siteops-web
    restart: unless-stopped
    environment:
      <<: *web-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Container-level healthcheck stays on /healthz (liveness): Docker uses
    # this to decide whether to restart the container, and we don't want a
    # transient DB/Redis blip to trip the restart loop. Caddy's upstream
    # health probe is the one that uses /readyz (see infra/caddy/Caddyfile).
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:3000/healthz || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    expose:
      - '3000'
    networks:
      - siteops-net

  worker:
    image: ${SITEOPS_WORKER_IMAGE:-siteops/worker:local}
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: siteops-worker
    restart: unless-stopped
    environment:
      <<: *web-env
      # Boots Chromium-backed Lighthouse runner; the image already ships the
      # binary + the optional `lighthouse` / `chrome-launcher` deps.
      LIGHTHOUSE_RUNNER: ${LIGHTHOUSE_RUNNER:-real}
      LIGHTHOUSE_DATA_DIR: /var/lib/siteops/lighthouse
      AUDIT_DATA_DIR: /var/lib/siteops/audits
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - lighthouse-data:/var/lib/siteops/lighthouse
      - audit-data:/var/lib/siteops/audits
    networks:
      - siteops-net

  caddy:
    image: caddy:2
    container_name: siteops-caddy
    restart: unless-stopped
    environment:
      SITEOPS_DOMAIN: ${SITEOPS_DOMAIN:-localhost}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-admin@example.com}
    ports:
      - '${CADDY_HTTP_PORT:-80}:80'
      - '${CADDY_HTTPS_PORT:-443}:443'
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
    networks:
      - siteops-net

  # T49 — Daily pg_dump sidecar. Opt-in via the `backup` profile so a
  # plain `docker compose up -d` doesn't pin an extra container in stacks
  # that prefer to back up via another mechanism (managed PG, snapshots,
  # pgbackrest, ...). Operational runbook: docs/12-backup-restore.md.
  postgres-backup:
    image: postgres:16-alpine
    container_name: siteops-postgres-backup
    profiles: [backup]
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-siteops}
      POSTGRES_DB: ${POSTGRES_DB:-siteops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BACKUP_DIR: /backups
      KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
      BACKUP_RUN_ON_BOOT: ${BACKUP_RUN_ON_BOOT:-false}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backup/backup.sh:/usr/local/bin/backup.sh:ro
      - ./backup/restore.sh:/usr/local/bin/restore.sh:ro
      - ./backup/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - pg-backup:/backups
    entrypoint: ['/bin/sh', '/usr/local/bin/entrypoint.sh']
    networks:
      - siteops-net

volumes:
  pg-data:
  redis-data:
  caddy-data:
  caddy-config:
  lighthouse-data:
  audit-data:
  pg-backup:

networks:
  siteops-net:
    name: siteops-net
    driver: bridge
