version: 2

# Weekly bumps, grouped to keep PR noise low. Patch/minor updates are batched
# into a single PR per ecosystem; majors land separately because they often
# need code changes.
updates:
  # JavaScript dependencies (whole pnpm workspace).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # GitHub Actions versions used by .github/workflows/*.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Base images referenced by infra/Dockerfile.*. Dependabot scans the
  # `FROM` lines and proposes tag bumps.
  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
