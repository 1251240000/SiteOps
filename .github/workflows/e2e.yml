name: E2E

# Nightly Playwright suite. Runs the dashboard happy-path against a real
# Postgres + Redis service container, with the Next.js app booted by the
# Playwright `webServer` config. Add new specs under `apps/web/e2e/`.
on:
  workflow_dispatch:
  schedule:
    # 03:30 UTC daily (= 11:30 CST). Off-peak enough that flakes don't block
    # PR turnaround in the morning.
    - cron: '30 3 * * *'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: siteops
          POSTGRES_USER: siteops
          POSTGRES_PASSWORD: ${{ secrets.CI_PG_PASSWORD || 'siteops-ci' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U siteops -d siteops"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      CI: 'true'
      DATABASE_URL: postgres://siteops:${{ secrets.CI_PG_PASSWORD || 'siteops-ci' }}@localhost:5432/siteops
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-only-do-not-trust
      TURBO_TELEMETRY_DISABLED: '1'
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ChangeMe123!
      E2E_ADMIN_EMAIL: admin@example.com
      E2E_ADMIN_PASSWORD: ChangeMe123!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        # Playwright tests boot the real Next.js dev server, which imports
        # `@siteops/db`, `@siteops/services`, etc. as built dist outputs.
        run: pnpm --filter "./packages/*" build

      - name: Apply DB migrations
        run: pnpm --filter @siteops/db db:migrate

      - name: Seed admin user
        run: pnpm --filter @siteops/db db:seed

      - name: Install Playwright browsers
        run: pnpm --filter @siteops/web exec playwright install --with-deps chromium

      - name: Run Playwright suite
        run: pnpm --filter @siteops/web test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            **/playwright-report/**
            **/test-results/**
          if-no-files-found: ignore
          retention-days: 7
