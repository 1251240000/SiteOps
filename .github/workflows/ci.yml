name: CI

# Runs on every PR and on pushes to the long-lived branches we cut releases
# from. Workflow_dispatch lets ops re-run the full pipeline by hand when a
# transient flake needs reproducing.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same ref when a new commit lands; saves CI
# minutes on rapid-iteration PRs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: lint · typecheck · test · build · smoke
    runs-on: ubuntu-latest
    # 25 min covers a cold cache: deps install (~2m) + lint/typecheck (~1m) +
    # test:coverage (~3m) + build (~2m) + smoke (~3m). Hot cache lands < 8m.
    timeout-minutes: 25

    # Postgres + Redis service containers wired up now so integration tests
    # added later (T11+) just need to read DATABASE_URL / REDIS_URL. Today's
    # unit tests use PGlite and don't actually touch these services.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: siteops
          POSTGRES_USER: siteops
          # Throwaway CI credential — DB only listens on the runner's loopback.
          # Anything that needs real secrets must use a repo/org secret.
          POSTGRES_PASSWORD: ${{ secrets.CI_PG_PASSWORD || 'siteops-ci' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U siteops -d siteops"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      CI: 'true'
      DATABASE_URL: postgres://siteops:${{ secrets.CI_PG_PASSWORD || 'siteops-ci' }}@localhost:5432/siteops
      REDIS_URL: redis://localhost:6379
      # Never used to sign real sessions; satisfies env validation only.
      AUTH_SECRET: ci-only-do-not-trust
      # Turbo telemetry is noise in CI logs.
      TURBO_TELEMETRY_DISABLED: '1'
      # T50 — Playwright smoke test fixtures expect a seeded admin and pin
      # the dashboard locale to en-US. Mirrors `e2e.yml` env exactly so
      # specs work in both jobs without a local conditional.
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ChangeMe123!
      E2E_ADMIN_EMAIL: admin@example.com
      E2E_ADMIN_PASSWORD: ChangeMe123!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          # pnpm store gets cached by setup-node when cache: pnpm is set.
          cache: pnpm

      # Turbo's filesystem cache so re-runs / second jobs are fast.
      # Keyed by lockfile so dep changes invalidate cleanly.
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: i18n catalog parity
        run: pnpm --filter @siteops/web i18n:check

      - name: OpenAPI spec parity
        run: pnpm --filter @siteops/web openapi:check

      # T50 — `test:coverage` runs vitest with the v8 coverage provider in
      # every workspace; thresholds live next to each `vitest.config.ts` and
      # CI fails when any package drops below them.
      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      # ------------------------------------------------------------------
      # Playwright @smoke (T50)
      #
      # Runs the subset of `apps/web/e2e/*.spec.ts` whose titles include
      # `@smoke` against a real Postgres + Redis. Designed to stay under 5
      # minutes wall-clock so it's safe to gate on per-PR. The full
      # Playwright suite still runs nightly via `e2e.yml`.
      # ------------------------------------------------------------------
      - name: Apply DB migrations
        run: pnpm --filter @siteops/db db:migrate

      - name: Seed admin user
        run: pnpm --filter @siteops/db db:seed

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Keyed by lockfile so a Playwright bump pulls a fresh browser.
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @siteops/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        # `playwright install --with-deps` also installs apt packages; with
        # a cache hit we still need those system libs, but we can skip the
        # browser download.
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @siteops/web exec playwright install-deps chromium

      - name: Run Playwright @smoke suite
        run: pnpm --filter @siteops/web test:e2e:smoke

      # ------------------------------------------------------------------
      # Artifacts
      # ------------------------------------------------------------------
      # T50 — coverage report is always uploaded so reviewers can browse the
      # HTML report in the run summary; `if-no-files-found: ignore` is just
      # belt-and-suspenders in case a package skips coverage in the future.
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: |
            **/coverage/**
            **/.vitest-reports/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-smoke-${{ github.run_id }}
          path: |
            **/playwright-report/**
            **/test-results/**
          if-no-files-found: ignore
          retention-days: 7
